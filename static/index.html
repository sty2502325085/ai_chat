<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Chat Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <section id="auth-screen" class="auth-screen">
      <div class="auth-card">
        <div class="auth-brand">
          <span class="brand-mark">AI</span>
          <div>
            <p class="eyebrow">FastAPI + DeepSeek</p>
            <h1>AI 聊天助手</h1>
          </div>
        </div>

        <div class="auth-cat-card" aria-label="灰白小猫">
          <img src="/static/assets/cat-mascot.png" alt="灰白小猫插画角色" />
          <div>
            <p class="eyebrow">Cat Mode</p>
            <strong>带着猫猫一起聊天</strong>
          </div>
        </div>

        <div class="auth-tabs" role="tablist" aria-label="登录或注册">
          <button id="login-tab" class="auth-tab active" type="button">登录</button>
          <button id="register-tab" class="auth-tab" type="button">注册</button>
        </div>

        <form id="auth-form" class="auth-form">
          <label>
            用户名
            <input id="auth-username" name="username" autocomplete="username" required />
          </label>
          <label>
            密码
            <input id="auth-password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button id="auth-submit" type="submit">登录</button>
          <p id="auth-message" class="auth-message"></p>
        </form>
      </div>
    </section>

    <main id="app-shell" class="app-shell is-hidden">
      <div id="sidebar-backdrop" class="sidebar-backdrop" aria-hidden="true"></div>

      <aside class="sidebar" aria-label="聊天记录">
        <div class="sidebar-header">
          <div class="brand-block">
            <span class="brand-mark">AI</span>
            <div>
            <p class="eyebrow">History</p>
            <h2>聊天记录</h2>
            </div>
          </div>
          <button id="new-chat-button" class="secondary-button" type="button">+ 新对话</button>
        </div>
        <div id="session-list" class="session-list"></div>
      </aside>

      <section class="chat-panel" aria-label="AI chat">
        <header class="chat-header">
          <div class="chat-title-row">
            <button id="history-toggle-button" class="icon-button history-toggle" type="button" aria-label="打开聊天记录">
              ☰
            </button>
            <div>
              <p class="eyebrow">FastAPI + DeepSeek</p>
              <h1>AI 聊天助手</h1>
            </div>
          </div>
          <div class="header-actions">
            <span id="user-pill" class="user-pill"></span>
            <span id="usage-pill" class="usage-pill"></span>
            <span id="status" class="status">本地运行中</span>
            <div class="more-menu">
              <button id="more-button" class="icon-button" type="button" aria-label="更多操作" aria-expanded="false">
                ⋯
              </button>
              <div id="more-menu-panel" class="more-menu-panel is-hidden">
                <button id="admin-button" class="secondary-button is-hidden" type="button">后台</button>
                <button id="clear-chat-button" class="secondary-button" type="button">清空</button>
                <button id="logout-button" class="secondary-button" type="button">退出</button>
              </div>
            </div>
          </div>
        </header>

        <img class="chat-cat-decoration" src="/static/assets/cat-mascot.png" alt="" aria-hidden="true" />

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chat-form" class="composer">
          <textarea
            id="message-input"
            name="message"
            rows="2"
            placeholder="输入你的问题，例如：什么是 Docker？"
            autocomplete="off"
            required
          ></textarea>
          <button id="send-button" type="submit">发送</button>
        </form>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
